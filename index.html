<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MADE DIFFERENT.</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      min-height: 100vh;
      background: #fff;
      color: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", system-ui, sans-serif;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
    }
    .hero {
      text-align: center;
    }
    h1 {
      font-size: clamp(2.5rem, 10vw, 6.5rem);
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1.05;
    }
    .coming-soon {
      margin-top: 1.25rem;
      font-size: 0.8125rem;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #86868b;
    }
  </style>
</head>
<body>
  <div class="hero">
    <h1>MADE DIFFERENT.</h1>
    <p class="coming-soon">Stay tuned</p>
  </div>
</body>
</html>
