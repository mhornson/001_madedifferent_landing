  }
</style>

<style>
  #wrap { position:relative; width:100%; height:420px; background:#000; border-radius:12px; overflow:hidden; cursor:none; }
  #gl { position:absolute; inset:0; width:100%; height:100%; display:block; }
  #hint { position:absolute; bottom:16px; left:50%; transform:translateX(-50%); font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:rgba(255,255,255,.13); pointer-events:none; white-space:nowrap; }
</style>
<div id="wrap"><canvas id="gl"></canvas><div id="hint">move mouse · lens blur + aberration</div></div>
<script>
(function(){
  const wrap = document.getElementById('wrap');
  const canvas = document.getElementById('gl');
  const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
  if(!gl){ wrap.innerHTML='<p style="color:#fff;padding:2rem">WebGL not available</p>'; return; }

  let W, H, mx=-1, my=-1, smx=0.5, smy=0.5;

  function resize(){
    const r = wrap.getBoundingClientRect();
    W = canvas.width  = r.width;
    H = canvas.height = r.height;
    gl.viewport(0,0,W,H);
    if(window.__fontReady){
      buildSceneTexture();
    }
  }

  wrap.addEventListener('mousemove', e=>{
    const r = wrap.getBoundingClientRect();
    mx = (e.clientX-r.left)/r.width;
    my = (e.clientY-r.top)/r.height;
  });
  wrap.addEventListener('mouseleave',()=>{ mx=-1; });

  let sceneTex;
  function buildSceneTexture(){
    const oc = document.createElement('canvas');
    oc.width=W; oc.height=H;
    const c = oc.getContext('2d');
    c.fillStyle='#080806';
    c.fillRect(0,0,W,H);
    c.fillStyle='rgba(255,255,255,0.045)';
    for(let x=20;x<W;x+=28) for(let y=20;y<H;y+=28){
      c.beginPath(); c.arc(x,y,0.8,0,Math.PI*2); c.fill();
    }
    c.textAlign='center'; c.textBaseline='middle';
    const fs = Math.round(W*0.115);
    c.font=`800 ${fs}px 'KollektifCustom','Helvetica Neue',Arial,sans-serif`;
    c.fillStyle='#f0ece4';
    c.fillText('made different.',      W*0.5, H*0.36);
    c.fillText('different.', W*0.5, H*0.64);
    const fs2 = Math.round(W*0.022);
    c.font=`300 ${fs2}px 'KollektifCustom','Helvetica Neue',Arial,sans-serif`;
    c.fillStyle='rgba(240,236,228,0.3)';
    c.fillText('Creative Dev Studio · Vienna', W*0.5, H*0.83);

    if(sceneTex) gl.deleteTexture(sceneTex);
    sceneTex = gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D, sceneTex);
    gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, true);
    gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,oc);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
  }

  const vert = `
    attribute vec2 a_pos;
    varying vec2 v_uv;
    void main(){
      v_uv = a_pos*0.5+0.5;
      gl_Position = vec4(a_pos,0,1);
    }
  `;

  // Bokeh-style blur: samples in a spiral/disk pattern per channel,
  // each sample also displaced by the aberration offset — so blur AND split happen together
  const frag = `
    precision highp float;
    varying vec2 v_uv;
    uniform sampler2D u_scene;
    uniform vec2  u_mouse;
    uniform float u_radius;
    uniform float u_strength;
    uniform float u_blur;
    uniform float u_time;
    uniform float u_aspect;
    uniform vec2  u_px;       // 1.0/vec2(W,H)

    float hash(vec2 p){ return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453); }
    float noise(vec2 p){
      vec2 i=floor(p), f=fract(p);
      f=f*f*(3.0-2.0*f);
      return mix(mix(hash(i),hash(i+vec2(1,0)),f.x),
                 mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),f.x),f.y);
    }

    // Poisson disk — 12 fixed samples for a soft bokeh kernel
    vec2 poissonDisk[12];
    void initPoisson(){
      poissonDisk[0]  = vec2(-0.326, -0.406);
      poissonDisk[1]  = vec2(-0.840, -0.074);
      poissonDisk[2]  = vec2(-0.696,  0.457);
      poissonDisk[3]  = vec2(-0.203,  0.621);
      poissonDisk[4]  = vec2( 0.962, -0.195);
      poissonDisk[5]  = vec2( 0.473, -0.480);
      poissonDisk[6]  = vec2( 0.519,  0.767);
      poissonDisk[7]  = vec2( 0.185, -0.893);
      poissonDisk[8]  = vec2( 0.507,  0.064);
      poissonDisk[9]  = vec2( 0.896,  0.412);
      poissonDisk[10] = vec2(-0.322, -0.933);
      poissonDisk[11] = vec2(-0.792, -0.598);
    }

    void main(){
      initPoisson();
      vec2 uv = v_uv;
      vec2 mouseUV = vec2(u_mouse.x, 1.0 - u_mouse.y);

      vec2 asp = vec2(u_aspect, 1.0);
      vec2 delta = (uv - mouseUV) * asp;
      float dist = length(delta);

      float norm = clamp(dist / u_radius, 0.0, 1.0);
      float strength = pow(1.0 - norm, 2.2);

      vec2 dir = normalize(delta + vec2(0.0001));
      vec2 tang = vec2(-dir.y, dir.x);

      float n1 = noise(uv*3.5 + u_time*0.18)*2.0-1.0;
      float n2 = noise(uv*2.8 + u_time*0.13+5.3)*2.0-1.0;
      vec2 noiseOff = vec2(n1,n2)*0.003*strength;
      float tangN = noise(uv*4.0+u_time*0.22+2.1)*2.0-1.0;

      float disp = u_strength * strength;
      float blurR = u_blur * strength;   // blur radius scales with aberration strength

      vec2 offR = dir*(disp*1.0)/asp + tang*(tangN*disp*0.3)/asp + noiseOff;
      vec2 offG = noiseOff*0.4 + dir*(disp*0.08)/asp;
      vec2 offB = -dir*(disp*0.88)/asp - tang*(tangN*disp*0.25)/asp + noiseOff*0.9;

      // rotate poisson kernel slightly per frame for temporal smoothness
      float angle = u_time * 0.5;
      float ca = cos(angle), sa = sin(angle);

      float r=0.0, g=0.0, b=0.0;
      float wSum = 0.0;

      for(int i=0; i<12; i++){
        // rotate sample offset
        vec2 s = poissonDisk[i];
        vec2 sr = vec2(s.x*ca - s.y*sa, s.x*sa + s.y*ca);

        // scale by blur radius (in pixel space → UV)
        vec2 sOff = sr * blurR * u_px;

        // weight: gaussian falloff from kernel centre
        float w = exp(-dot(sr,sr)*2.5);

        r += texture2D(u_scene, clamp(uv + offR + sOff, 0.001, 0.999)).r * w;
        g += texture2D(u_scene, clamp(uv + offG + sOff*0.5, 0.001, 0.999)).g * w;
        b += texture2D(u_scene, clamp(uv + offB + sOff, 0.001, 0.999)).b * w;
        wSum += w;
      }
      r /= wSum; g /= wSum; b /= wSum;

      vec4 base = texture2D(u_scene, uv);
      float blend = smoothstep(0.0, 0.18, strength);
      vec3 aberrated = vec3(r,g,b) * (1.0 - strength*0.1);

      float grain = hash(uv + fract(u_time*0.07))*0.04 - 0.02;
      vec3 col = mix(base.rgb, aberrated, blend) + grain;
      gl_FragColor = vec4(col, 1.0);
    }
  `;

  function compile(type, src){
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    return s;
  }
  const prog = gl.createProgram();
  gl.attachShader(prog, compile(gl.VERTEX_SHADER, vert));
  gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, frag));
  gl.linkProgram(prog);
  gl.useProgram(prog);

  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
  const aPos = gl.getAttribLocation(prog,'a_pos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos,2,gl.FLOAT,false,0,0);

  const uScene    = gl.getUniformLocation(prog,'u_scene');
  const uMouse    = gl.getUniformLocation(prog,'u_mouse');
  const uRadius   = gl.getUniformLocation(prog,'u_radius');
  const uStrength = gl.getUniformLocation(prog,'u_strength');
  const uBlur     = gl.getUniformLocation(prog,'u_blur');
  const uTime     = gl.getUniformLocation(prog,'u_time');
  const uAspect   = gl.getUniformLocation(prog,'u_aspect');
  const uPx       = gl.getUniformLocation(prog,'u_px');

  window.__fontReady = false;
  Promise.all([
    document.fonts.load("800 64px KollektifCustom"),
    document.fonts.load("300 24px KollektifCustom"),
    document.fonts.ready
  ]).catch(()=>{}).finally(()=>{
    window.__fontReady = true;
    resize();
  });
  window.addEventListener('resize', resize);

  const start = performance.now();

  function frame(){
    requestAnimationFrame(frame);
    const t = (performance.now()-start)*0.001;
    if(mx>=0){ smx+=(mx-smx)*0.09; smy+=(my-smy)*0.09; }

    gl.useProgram(prog);
    gl.activeTexture(gl.TEXTURE0);
    gl.bindTexture(gl.TEXTURE_2D, sceneTex);
    gl.uniform1i(uScene, 0);
    gl.uniform2f(uMouse, smx, smy);
    gl.uniform1f(uRadius,   0.28);
    gl.uniform1f(uStrength, 0.022);
    gl.uniform1f(uBlur,     12.0);   // blur kernel size in pixels
    gl.uniform1f(uTime, t);
    gl.uniform1f(uAspect, W/H);
    gl.uniform2f(uPx, 1.0/W, 1.0/H);

    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  }
  frame();
})();
</script>
